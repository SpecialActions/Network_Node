name: Fetch and Test Nodes

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时运行一次
  workflow_dispatch:      # 支持手动触发

jobs:
  run-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install requests pyyaml

      - name: Setup Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          sleep 5
          curl -4 ifconfig.me

      - name: 1. Fetch Nodes & Build API (fetch.py)
        run: python fetch.py

      - name: 2. Setup Subconverter & Merge Nodes
        run: |
          wget https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -zxvf subconverter_linux64.tar.gz
          ./subconverter/subconverter > /dev/null 2>&1 &
          sleep 2
          
          # 开个本地端口把 TG 节点发给 Subconverter
          python -m http.server 8000 &
          sleep 1
          
          # 读取 fetch 拼接好的指令
          API_URL=$(cat sub_api_url.txt)
          curl "$API_URL" > clash_nodes.yaml

      - name: 3. Setup Mihomo Core
        run: |
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz
          gunzip mihomo-linux-amd64-v1.18.3.gz
          mv mihomo-linux-amd64-v1.18.3 mihomo
          chmod +x mihomo

      - name: 4. Dedup, Test and Rename (check.py)
        run: python check.py

      - name: 5. Commit and Push (保存极速节点)
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          # 核心修复：把可能发生自我修改的 fetch.py 也加到提交列表里
          git add final_sub.yaml tg_nodes.txt fetch.py
          git commit -m "🚀 Auto update High-Speed nodes: $(date)" || echo "No changes to commit"
          git pull --rebase origin main
          git push
