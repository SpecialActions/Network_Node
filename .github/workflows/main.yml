name: Fetch and Test High-Speed Nodes

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动执行
  workflow_dispatch:      # 允许手动在网页点击触发

jobs:
  run-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install requests pyyaml

      - name: Setup Cloudflare WARP (抗封锁)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          sleep 5
          curl -4 ifconfig.me

      - name: 1. Fetch Nodes & Build API (运行 fetch.py)
        run: python fetch.py

      - name: 2. Setup Subconverter (MetaCubeX 终极版)
        run: |
          # 直接拉取 MetaCubeX 官方维护的容器镜像，通杀 Hysteria2 / Vless 等一切新协议
          docker run -d --network host ghcr.io/metacubex/subconverter:latest
          sleep 5
          
          # 启动本地服务使得 Subconverter 可以读取抓取到的 TG 节点
          python -m http.server 8000 &
          sleep 2
          
          # 读取 fetch.py 动态生成的 API 链接并执行合并转换
          API_URL=$(cat sub_api_url.txt)
          curl -s "$API_URL" > clash_nodes.yaml

      - name: 3. Setup Mihomo Core (准备内核)
        run: |
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz
          gunzip mihomo-linux-amd64-v1.18.3.gz
          mv mihomo-linux-amd64-v1.18.3 mihomo
          chmod +x mihomo

      - name: 4. Dedup, Test and Rename (运行 check.py)
        run: python check.py

      - name: 5. Generate Universal Base64 Subscription (生成通用订阅)
        run: |
          # 统一命名规范：输出为 final_sub.txt
          curl -s "http://127.0.0.1:25500/sub?target=mixed&url=http://127.0.0.1:8000/final_sub.yaml" > final_sub.txt

      - name: 6. Commit and Push (保存所有格式的极速节点)
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          
          # 确保把生成的 final_sub.txt 和 自我进化的 fetch.py 都加入暂存区
          git add final_sub.yaml final_sub.txt tg_nodes.txt fetch.py
          git commit -m "🚀 Auto update High-Speed nodes & Sublinks: $(date)" || echo "No changes to commit"
          
          # 终极防冲突合并策略
          git pull origin main --rebase=false -X ours || true
          git push
