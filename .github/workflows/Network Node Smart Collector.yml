name: 📦 Network Node Smart Collector

permissions:
  contents: write

concurrency:
  group: node-collector-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/Network Node Smart Collector.yml'
  schedule:
    - cron: '0 */8 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # ==========================================
      # 【开关配置】
      # 1. 拉取前是否全量清空 (设为 true 时，无论内容是否变化都会强制推送刷新)
      CLEAN_BEFORE_PULL: true 
      
      # 2. 是否清理 7 天前的旧文件 (当 CLEAN_BEFORE_PULL 为 true 时，此项自动失效)
      CLEAN_OLD_FILES: false
      # ==========================================

    steps:
      - name: Checkout 仓库内容
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 执行前置清理
        run: |
          mkdir -p Nodes
          mkdir -p temp/clone
          
          if [ "${{ env.CLEAN_BEFORE_PULL }}" = "true" ]; then
            echo "🧹 模式：全量清空 Nodes 文件夹..."
            # 使用 rm -rf 确保彻底抹除，touch .gitkeep 保证目录结构不消失
            rm -rf Nodes/*
            touch Nodes/.gitkeep
          elif [ "${{ env.CLEAN_OLD_FILES }}" = "true" ]; then
            echo "📆 模式：清理 7 天前的旧文件..."
            find Nodes -type f -mtime +7 -delete
          fi

      - name: 🚀 采集节点并处理冲突
        shell: bash
        run: |
          TARGET_DIR="Nodes"

          smart_move() {
              local src="$1"
              local base_name=$(basename "$2")
              local name="${base_name%.*}"
              local ext="${base_name##*.}"
              
              [[ "$name" == "$ext" ]] && ext_dot="" || ext_dot=".$ext"
              
              local final_path="$TARGET_DIR/$base_name"
              local counter=1

              while [[ -f "$final_path" ]]; do
                  final_path="$TARGET_DIR/${name}_${counter}${ext_dot}"
                  ((counter++))
              done
              cp "$src" "$final_path"
          }

          repos=(
            "https://github.com/Barabama/FreeNodes/tree/main/nodes"
            "https://github.com/Jsnzkpg/Jsnzkpg.git"
            "https://github.com/free-nodes/v2rayfree.git"
            "https://github.com/free-nodes/clashfree.git"
          )

          for url in "${repos[@]}"; do
            echo "--------------------------------------------------------"
            echo "🔄 正在尝试提取: $url"

            if [[ "$url" == *".git" ]] || [[ "$url" == *"/tree/"* ]] || [[ "$url" != *.* ]]; then
                clean_url="${url#https://github.com/}"
                clean_url="${clean_url%.git}"
                repo_name=$(echo "$clean_url" | cut -d'/' -f1-2)
                
                if [[ "$clean_url" == *"/tree/"* ]]; then
                    branch=$(echo "$clean_url" | awk -F'/tree/' '{print $2}' | cut -d'/' -f1)
                    repo_subpath=$(echo "$clean_url" | awk -F'/tree/' '{print $2}' | cut -d'/' -f2-)
                else
                    branch="main" # 默认分支
                    repo_subpath=""
                fi

                rm -rf temp/clone/*
                # 尝试指定分支，失败则尝试默认分支
                if git clone --depth=1 -b "$branch" "https://github.com/${repo_name}.git" temp/clone 2>/dev/null || \
                   git clone --depth=1 "https://github.com/${repo_name}.git" temp/clone 2>/dev/null; then
                    
                    # 统计提取文件数
                    file_count=$(find "temp/clone/$repo_subpath" -maxdepth 1 -type f | wc -l)
                    find "temp/clone/$repo_subpath" -maxdepth 1 -type f | while read -r file; do
                        smart_move "$file" "$(basename "$file")"
                    done
                    echo "✅ 成功从仓库提取 $file_count 个文件"
                else
                    echo "❌ 无法访问仓库: $url"
                fi
                continue
            fi

            # 单文件处理
            [[ "$url" == *"/blob/"* ]] && url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|;s|/blob/|/|')
            filename=$(basename "$url")
            if curl -L -s -f "$url" -o "temp/single_file"; then
              smart_move "temp/single_file" "$filename"
              echo "✅ 单文件下载成功: $filename"
            else
              echo "❌ 下载失败: $url"
            fi
          done

      - name: 📤 原子化提交并触发联动
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 暂存所有变更（包括删除旧文件和新增文件）
          git add Nodes/
          
          # 核心逻辑：判断是否需要强制推送
          SHOULD_PUSH=false
          if [ "${{ env.CLEAN_BEFORE_PULL }}" = "true" ]; then
             SHOULD_PUSH=true
             echo "🚀 [强制模式] 开启了清空开关，无论内容是否有变都将刷新仓库。"
          elif ! git diff --cached --quiet; then
             SHOULD_PUSH=true
             echo "🚀 [更新模式] 检测到内容变化，准备推送。"
          fi

          if [ "$SHOULD_PUSH" = "true" ]; then
            # 即使内容没变，只要 commit 就能更新 GitHub 上的文件时间戳并触发后续流程
            git commit --allow-empty -m "🌐 Nodes 同步: 清理并刷新节点库 ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push origin HEAD:main
          else
            echo "✅ 节点内容无变化且未开启强制清空，跳过推送。"
          fi

      - name: 清理临时空间
        if: always()
        run: rm -rf temp
