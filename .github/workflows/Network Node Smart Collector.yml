name: 📦 Network Node Smart Collector (Standalone)

permissions:
  contents: write

concurrency:
  group: node-collector-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/Network Node Smart Collector.yml'
  schedule:
    - cron: '0 */8 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # ==========================================
      # 【开关配置】
      CLEAN_BEFORE_PULL: true     # 拉取前全量清空
      CLEAN_OLD_FILES: true       # 优先级低于全量清空
      # ==========================================

    steps:
      - name: Checkout 仓库内容
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 执行清理逻辑
        run: |
          mkdir -p Nodes
          mkdir -p temp/clone
          
          # 优先级逻辑：如果全量清空开启，则不执行 7 天清理
          if [ "${{ env.CLEAN_BEFORE_PULL }}" = "true" ]; then
            echo "🧹 优先级高：执行全量清空 Nodes 目录..."
            rm -rf Nodes/*
          elif [ "${{ env.CLEAN_OLD_FILES }}" = "true" ]; then
            echo "📆 优先级中：清理 7 天前的旧文件..."
            find Nodes -type f -mtime +7 -delete 2>/dev/null || true
          fi
          touch Nodes/.gitkeep

      - name: 🚀 采集节点
        shell: bash
        run: |
          TARGET_DIR="Nodes"
          smart_move() {
              local src="$1"
              local base_name=$(basename "$2")
              local name="${base_name%.*}"
              local ext="${base_name##*.}"
              [[ "$name" == "$ext" ]] && ext_dot="" || ext_dot=".$ext"
              local final_path="$TARGET_DIR/$base_name"
              local counter=1
              while [[ -f "$final_path" ]]; do
                  final_path="$TARGET_DIR/${name}_${counter}${ext_dot}"
                  ((counter++))
              done
              cp "$src" "$final_path"
          }

          repos=(
            "https://github.com/Barabama/FreeNodes/tree/main/nodes"
            "https://github.com/Jsnzkpg/Jsnzkpg.git"
            "https://github.com/free-nodes/v2rayfree.git"
            "https://github.com/free-nodes/clashfree.git"
          )

          for url in "${repos[@]}"; do
            echo "🔄 提取: $url"
            if [[ "$url" == *".git" ]] || [[ "$url" == *"/tree/"* ]] || [[ "$url" != *.* ]]; then
                clean_url="${url#https://github.com/}"; clean_url="${clean_url%.git}"
                repo_name=$(echo "$clean_url" | cut -d'/' -f1-2)
                [[ "$clean_url" == *"/tree/"* ]] && branch=$(echo "$clean_url" | awk -F'/tree/' '{print $2}' | cut -d'/' -f1) && repo_subpath=$(echo "$clean_url" | awk -F'/tree/' '{print $2}' | cut -d'/' -f2-) || branch="main" && repo_subpath=""
                rm -rf temp/clone/*
                if git clone --depth=1 -b "$branch" "https://github.com/${repo_name}.git" temp/clone 2>/dev/null; then
                    find "temp/clone/$repo_subpath" -maxdepth 1 -type f | while read -r file; do
                        smart_move "$file" "$(basename "$file")"
                    done
                fi
                continue
            fi
            [[ "$url" == *"/blob/"* ]] && url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|;s|/blob/|/|')
            filename=$(basename "$url")
            curl -L -s -f "$url" -o "temp/single_file" && smart_move "temp/single_file" "$filename"
          done

      - name: 📤 纯净提交（不联动，跳过 CI）
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Nodes/
          
          # 使用 [skip ci] 确保此推送不会触发其他任何工作流
          if ! git diff --cached --quiet; then
            git commit -m "🌐 Nodes 独立更新: 清理与重新采集 [skip ci]"
            git push origin HEAD:main
            echo "✅ 已完成独立推送，其他工作流已被跳过。"
          else
            echo "✅ 无变化，跳过。"
          fi

      - name: 清理临时空间
        if: always()
        run: rm -rf temp
