name: 📦 Network Node Smart Collector

permissions:
  contents: write
  actions: write # 必须添加此权限才能触发其他工作流

concurrency:
  group: node-collector-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/Network Node Smart Collector.yml'
  schedule:
    - cron: '0 */3 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      CLEAN_BEFORE_PULL: true 
      CLEAN_OLD_FILES: true
      GH_TOKEN: ${{ github.token }} # 用于执行 gh 命令

    steps:
      - name: Checkout 仓库内容
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 执行清理逻辑
        run: |
          mkdir -p Nodes
          mkdir -p temp/clone
          if [ "${{ env.CLEAN_BEFORE_PULL }}" = "true" ]; then
            echo "🧹 模式：正在清空 Nodes 目录..."
            rm -rf Nodes/*
          fi
          if [ "${{ env.CLEAN_OLD_FILES }}" = "true" ]; then
            if [ "$(ls -A Nodes)" ]; then
              find Nodes -type f -mtime +7 -delete || true
            fi
          fi

      - name: 🚀 采集并自动处理同名冲突
        shell: bash
        run: |
          TARGET_DIR="Nodes"
          smart_move() {
              local src="$1"
              local base_name=$(basename "$2")
              local name="${base_name%.*}"
              local ext="${base_name##*.}"
              if [[ "$name" == "$ext" ]]; then ext_dot=""; else ext_dot=".$ext"; fi
              local final_path="$TARGET_DIR/$base_name"
              local counter=1
              while [[ -f "$final_path" ]]; do
                  final_path="$TARGET_DIR/${name}_${counter}${ext_dot}"
                  ((counter++))
              done
              cp "$src" "$final_path"
          }

          repos=(
            "https://github.com/Barabama/FreeNodes/tree/main/nodes"
            "https://github.com/Jsnzkpg/Jsnzkpg.git"
            "https://github.com/free-nodes/v2rayfree.git"
            "https://github.com/free-nodes/clashfree.git"
          )

          for url in "${repos[@]}"; do
            if [[ "$url" == *".git" ]] || [[ "$url" == *"/tree/"* ]]; then
                repo_url_part=$(echo "$url" | sed -E 's|https://github.com/([^/]+/[^/]+).*|\1|')
                repo_name="${repo_url_part%.git}"
                rm -rf temp/clone/*
                if [[ "$url" == *"/tree/"* ]]; then
                    branch=$(echo "$url" | sed -E 's|.*/tree/([^/]+).*|\1|')
                    repo_subpath=$(echo "$url" | sed -E "s|.*/tree/$branch/||")
                else
                    branch="main"; repo_subpath=""
                fi
                if git clone --depth=1 -b "$branch" "https://github.com/${repo_name}.git" temp/clone 2>/dev/null; then
                    search_path="temp/clone/$repo_subpath"
                    if [ -d "$search_path" ]; then
                        find "$search_path" -maxdepth 1 -type f | while read -r file; do
                            smart_move "$file" "$(basename "$file")"
                        done
                    fi
                fi
                continue
            fi
            [[ "$url" == *"/blob/"* ]] && url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|;s|/blob/|/|')
            filename=$(basename "$url")
            if curl -L -s -f "$url" -o "temp/single_file"; then
              smart_move "temp/single_file" "$filename"
            fi
          done

      - name: 提交并推送
        id: commit_step
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A Nodes/
          if git diff --cached --quiet; then
            echo "pushed=false" >> $GITHUB_OUTPUT
            echo "✅ 内容无变动。"
          else
            git commit -m "🌐 Nodes 同步更新"
            git push origin HEAD:${{ github.ref_name }}
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 触发后续工作流
        if: steps.commit_step.outputs.pushed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "正在触发后续工作流..."
          
          # 触发第一个：main to B.yml
          gh workflow run "main to B.yml" --ref ${{ github.ref_name }}
          
          # 触发第二个：main.yml
          gh workflow run "main.yml" --ref ${{ github.ref_name }}
          
          # 触发第三个：main to B-README.yml
          gh workflow run "main to B-README.yml" --ref ${{ github.ref_name }}
          
          echo "✅ 所有工作流已成功启动请求。"

      - name: 清理临时空间
        if: always()
        run: rm -rf temp
