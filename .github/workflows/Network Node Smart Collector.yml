name: 📦 Network Node Smart Collector (Pro)

permissions:
  contents: write

concurrency:
  group: node-collector-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/Network Node Acquisition.yml'
  schedule:
    - cron: '0 */8 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # ==========================================
      # 【开关配置】
      # 1. 拉取前是否彻底清空 Nodes 目录 (默认关闭)
      CLEAN_BEFORE_PULL: true 
      
      # 2. 是否清理 Nodes 目录中 7 天前的文件 (默认开启)
      CLEAN_OLD_FILES: true
      # ==========================================

    steps:
      - name: Checkout 仓库内容
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 执行清理逻辑
        run: |
          mkdir -p Nodes
          mkdir -p temp/clone
          
          # 逻辑 1: 全量清空
          if [ "${{ env.CLEAN_BEFORE_PULL }}" = "true" ]; then
            echo "🧹 模式：拉取前全量清空 Nodes..."
            find Nodes -mindepth 1 -delete
          fi

          # 逻辑 2: 按时间清理 (7天前)
          if [ "${{ env.CLEAN_OLD_FILES }}" = "true" ]; then
            echo "📆 模式：正在清理 7 天前的旧文件..."
            # 查找并删除修改时间超过 7 天的文件
            find Nodes -type f -mtime +7 -exec rm -f {} \;
          fi

      - name: 🚀 采集并自动处理同名冲突
        shell: bash
        run: |
          TARGET_DIR="Nodes"

          smart_move() {
              local src="$1"
              local base_name=$(basename "$2")
              local name="${base_name%.*}"
              local ext="${base_name##*.}"
              
              if [[ "$name" == "$ext" ]]; then
                ext_dot=""
              else
                ext_dot=".$ext"
              fi
              
              local final_path="$TARGET_DIR/$base_name"
              local counter=1

              while [[ -f "$final_path" ]]; do
                  final_path="$TARGET_DIR/${name}_${counter}${ext_dot}"
                  ((counter++))
              done
              cp "$src" "$final_path"
          }

          repos=(
            "https://github.com/Barabama/FreeNodes/tree/main/nodes"
            "https://github.com/Jsnzkpg/Jsnzkpg.git"
            "https://github.com/free-nodes/v2rayfree.git"
            "https://github.com/free-nodes/clashfree.git"
          )

          for url in "${repos[@]}"; do
            echo "--------------------------------------------------------"
            echo "🔄 正在提取: $url"

            if [[ "$url" == *".git" ]] || [[ "$url" == *"/tree/"* ]] || [[ "$url" != *.* ]]; then
                clean_url="${url#https://github.com/}"
                clean_url="${clean_url%.git}"
                repo_name=$(echo "$clean_url" | cut -d'/' -f1-2)
                
                if [[ "$clean_url" == *"/tree/"* ]]; then
                    branch=$(echo "$clean_url" | awk -F'/tree/' '{print $2}' | cut -d'/' -f1)
                    repo_subpath=$(echo "$clean_url" | awk -F'/tree/' '{print $2}' | cut -d'/' -f2-)
                else
                    branch="main"
                    repo_subpath=""
                fi

                rm -rf temp/clone/*
                if git clone --depth=1 -b "$branch" "https://github.com/${repo_name}.git" temp/clone 2>/dev/null || \
                   git clone --depth=1 "https://github.com/${repo_name}.git" temp/clone 2>/dev/null; then
                    
                    find "temp/clone/$repo_subpath" -maxdepth 1 -type f | while read -r file; do
                        smart_move "$file" "$(basename "$file")"
                    done
                    echo "✅ 成功"
                fi
                continue
            fi

            [[ "$url" == *"/blob/"* ]] && url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|;s|/blob/|/|')
            filename=$(basename "$url")
            if curl -L -s -f "$url" -o "temp/single_file"; then
              smart_move "temp/single_file" "$filename"
              echo "✅ 单文件成功"
            fi
          done

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Nodes/
          if git diff --cached --quiet; then
            echo "✅ 无变动"
          else
            git commit -m "🌐 Nodes 更新 (Auto-Clean-7Days: ${{ env.CLEAN_OLD_FILES }})"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: 清理临时空间
        if: always()
        run: rm -rf temp
