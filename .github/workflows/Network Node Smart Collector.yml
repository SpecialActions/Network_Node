name: 📦 Network Node Smart Collector

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # 开关：关掉全量清空，打开七天清理
      CLEAN_BEFORE_PULL: false 
      CLEAN_OLD_FILES: true

    steps:
      - name: Checkout 仓库内容
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 执行清理逻辑
        run: |
          mkdir -p Nodes
          mkdir -p temp/clone
          
          if [ "${{ env.CLEAN_BEFORE_PULL }}" = "true" ]; then
            echo "🧹 全量清空..."
            rm -rf Nodes/*
          elif [ "${{ env.CLEAN_OLD_FILES }}" = "true" ]; then
            echo "📆 清理 7 天前的旧文件..."
            # 只有在 Nodes 文件夹不为空时执行清理，避免报错
            find Nodes -type f -mtime +7 -delete 2>/dev/null || true
          fi
          touch Nodes/.gitkeep

      - name: 🚀 采集节点
        shell: bash
        run: |
          # [此处保持之前的 smart_move 和 repos 抓取逻辑，省略部分代码以保持简洁]
          # ... (保持 smart_move 函数定义)
          # ... (保持 repos 循环抓取逻辑)
          
          # 【新增：强制更新时间戳文件】
          # 这样即使节点内容完全没变，这个文件的变化也会强制触发推送
          echo "Last Sync: $(date)" > Nodes/.last_update

      - name: 📤 强制推送触发联动
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Nodes/
          
          # 即使内容一模一样，我们也通过 --allow-empty 提交
          # 但因为我们增加了 .last_update 文件，其实每次都会有变化
          git commit -m "🌐 节点采集完成: $(date '+%Y-%m-%d %H:%M') [Trigger Next]"
          
          echo "🚀 正在推送并触发联动脚本..."
          git push origin HEAD:main
