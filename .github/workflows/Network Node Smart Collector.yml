name: 📦 Network Node Smart Collector

permissions:
  contents: write

concurrency:
  group: node-collector-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/Network Node Smart Collector.yml'
  schedule:
    - cron: '0 */8 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # 【开关配置】
      # 1. 拉取前是否彻底清空 Nodes 目录 (开启后，每次运行只保留本次采集到的文件)
      CLEAN_BEFORE_PULL: true 
      
      # 2. 是否清理 Nodes 目录中 7 天前的文件 (仅在 CLEAN_BEFORE_PULL 为 false 时有实际意义)
      CLEAN_OLD_FILES: true

    steps:
      - name: Checkout 仓库内容
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 执行清理逻辑
        run: |
          mkdir -p Nodes
          mkdir -p temp/clone
          
          # 逻辑 1: 全量物理清空
          if [ "${{ env.CLEAN_BEFORE_PULL }}" = "true" ]; then
            echo "🧹 模式：正在清空 Nodes 目录准备全量更新..."
            rm -rf Nodes/*
          fi

          # 逻辑 2: 按时间清理 (仅针对留存的旧文件)
          if [ "${{ env.CLEAN_OLD_FILES }}" = "true" ]; then
            echo "📆 模式：正在检索并清理 7 天前的过期文件..."
            # 只有当文件夹不为空时才执行，避免 find 报错
            if [ "$(ls -A Nodes)" ]; then
              find Nodes -type f -mtime +7 -delete || true
            fi
          fi

      - name: 🚀 采集并自动处理同名冲突
        shell: bash
        run: |
          TARGET_DIR="Nodes"

          # 智能移动函数：处理重名，防止覆盖
          smart_move() {
              local src="$1"
              local base_name=$(basename "$2")
              local name="${base_name%.*}"
              local ext="${base_name##*.}"
              
              if [[ "$name" == "$ext" ]]; then ext_dot=""; else ext_dot=".$ext"; fi
              
              local final_path="$TARGET_DIR/$base_name"
              local counter=1

              while [[ -f "$final_path" ]]; do
                  final_path="$TARGET_DIR/${name}_${counter}${ext_dot}"
                  ((counter++))
              done
              cp "$src" "$final_path"
          }

          # 采集源列表
          repos=(
            "https://github.com/Barabama/FreeNodes/tree/main/nodes"
            "https://github.com/Jsnzkpg/Jsnzkpg.git"
            "https://github.com/free-nodes/v2rayfree.git"
            "https://github.com/free-nodes/clashfree.git"
          )

          for url in "${repos[@]}"; do
            echo "--------------------------------------------------------"
            echo "🔄 正在处理: $url"

            # 仓库/目录提取逻辑
            if [[ "$url" == *".git" ]] || [[ "$url" == *"/tree/"* ]]; then
                # 提取仓库基础名
                repo_url_part=$(echo "$url" | sed -E 's|https://github.com/([^/]+/[^/]+).*|\1|')
                repo_name="${repo_url_part%.git}"
                
                rm -rf temp/clone/*
                
                # 分离分支和子路径
                if [[ "$url" == *"/tree/"* ]]; then
                    branch=$(echo "$url" | sed -E 's|.*/tree/([^/]+).*|\1|')
                    repo_subpath=$(echo "$url" | sed -E "s|.*/tree/$branch/||")
                else
                    branch="main"
                    repo_subpath=""
                fi

                # 克隆并提取文件
                if git clone --depth=1 -b "$branch" "https://github.com/${repo_name}.git" temp/clone 2>/dev/null || \
                   git clone --depth=1 "https://github.com/${repo_name}.git" temp/clone 2>/dev/null; then
                    
                    search_path="temp/clone/$repo_subpath"
                    if [ -d "$search_path" ]; then
                        find "$search_path" -maxdepth 1 -type f | while read -r file; do
                            smart_move "$file" "$(basename "$file")"
                        done
                        echo "✅ 采集成功"
                    else
                        echo "⚠️ 路径不存在: $repo_subpath"
                    fi
                fi
                continue
            fi

            # 单文件/Blob 提取逻辑
            [[ "$url" == *"/blob/"* ]] && url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|;s|/blob/|/|')
            filename=$(basename "$url")
            if curl -L -s -f "$url" -o "temp/single_file"; then
              smart_move "temp/single_file" "$filename"
              echo "✅ 单文件采集成功"
            fi
          done

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # -A 确保本地物理删除的操作能同步到 GitHub 远程仓库
          git add -A Nodes/
          
          if git diff --cached --quiet; then
            echo "✅ 内容无变动，跳过提交。"
          else
            git commit -m "🌐 Nodes 同步更新 (全量清理: ${{ env.CLEAN_BEFORE_PULL }})"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: 清理临时空间
        if: always()
        run: rm -rf temp
