name: 📦 Network Node Smart Collector

permissions:
  contents: write

concurrency:
  group: node-collector-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/Network Node Smart Collector.yml'
  schedule:
    - cron: '0 */8 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # ==========================================
      # 【开关配置】
      # 1. 拉取前是否全量清空 (建议设为 false，除非你不想保留任何上一次的成功节点)
      CLEAN_BEFORE_PULL: true 
      
      # 2. 是否清理 7 天前的旧文件 (保持仓库整洁的核心逻辑)
      CLEAN_OLD_FILES: false
      # ==========================================

    steps:
      - name: Checkout 仓库内容
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须为 0 才能正常 push 并触发后续工作流

      - name: 🚀 执行前置清理
        run: |
          mkdir -p Nodes
          mkdir -p temp/clone
          
          # 逻辑 1: 全量清空 (根据开关执行)
          if [ "${{ env.CLEAN_BEFORE_PULL }}" = "true" ]; then
            echo "🧹 正在执行拉取前全量清空..."
            find Nodes -mindepth 1 -delete
          fi

          # 逻辑 2: 按时间清理 (清理 7 天前没动过的旧文件)
          if [ "${{ env.CLEAN_OLD_FILES }}" = "true" ]; then
            echo "📆 正在清理 7 天前的旧文件..."
            find Nodes -type f -mtime +7 -exec rm -f {} \;
          fi

      - name: 🚀 采集节点并处理冲突
        shell: bash
        run: |
          TARGET_DIR="Nodes"

          # 智能重命名函数：防止同名覆盖，保留所有节点
          smart_move() {
              local src="$1"
              local base_name=$(basename "$2")
              local name="${base_name%.*}"
              local ext="${base_name##*.}"
              
              if [[ "$name" == "$ext" ]]; then
                ext_dot=""
              else
                ext_dot=".$ext"
              fi
              
              local final_path="$TARGET_DIR/$base_name"
              local counter=1

              while [[ -f "$final_path" ]]; do
                  final_path="$TARGET_DIR/${name}_${counter}${ext_dot}"
                  ((counter++))
              done
              cp "$src" "$final_path"
          }

          # 你的源仓库列表
          repos=(
            "https://github.com/Barabama/FreeNodes/tree/main/nodes"
            "https://github.com/Jsnzkpg/Jsnzkpg.git"
            "https://github.com/free-nodes/v2rayfree.git"
            "https://github.com/free-nodes/clashfree.git"
          )

          for url in "${repos[@]}"; do
            echo "--------------------------------------------------------"
            echo "🔄 正在提取: $url"

            if [[ "$url" == *".git" ]] || [[ "$url" == *"/tree/"* ]] || [[ "$url" != *.* ]]; then
                clean_url="${url#https://github.com/}"
                clean_url="${clean_url%.git}"
                repo_name=$(echo "$clean_url" | cut -d'/' -f1-2)
                
                # 分支与路径解析
                if [[ "$clean_url" == *"/tree/"* ]]; then
                    branch=$(echo "$clean_url" | awk -F'/tree/' '{print $2}' | cut -d'/' -f1)
                    repo_subpath=$(echo "$clean_url" | awk -F'/tree/' '{print $2}' | cut -d'/' -f2-)
                else
                    branch="main"
                    repo_subpath=""
                fi

                rm -rf temp/clone/*
                if git clone --depth=1 -b "$branch" "https://github.com/${repo_name}.git" temp/clone 2>/dev/null || \
                   git clone --depth=1 "https://github.com/${repo_name}.git" temp/clone 2>/dev/null; then
                    
                    find "temp/clone/$repo_subpath" -maxdepth 1 -type f | while read -r file; do
                        smart_move "$file" "$(basename "$file")"
                    done
                    echo "✅ 仓库提取成功"
                fi
                continue
            fi

            # 单文件 Raw 模式处理
            [[ "$url" == *"/blob/"* ]] && url=$(echo "$url" | sed 's|github.com|raw.githubusercontent.com|;s|/blob/|/|')
            filename=$(basename "$url")
            if curl -L -s -f "$url" -o "temp/single_file"; then
              smart_move "temp/single_file" "$filename"
              echo "✅ 单文件下载成功"
            fi
          done

      - name: 📤 原子化提交并触发联动
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 关键点：将删除动作和新增动作一并 add，保证推送时 Nodes 目录是完整的
          git add Nodes/
          
          if git diff --cached --quiet; then
            echo "✅ 节点内容无变化，不执行推送。"
          else
            echo "🚀 检测到更新，执行原子化推送..."
            git commit -m "🌐 Nodes 自动同步: 清理旧文件并存入新节点 [Auto-Trigger]"
            # 推送到当前分支，从而触发后续以 Nodes/** 为 path 的工作流
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: 清理
        if: always()
        run: rm -rf temp
