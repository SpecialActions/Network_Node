name: 🕷️ Auto Search Web Nodes

on:
  workflow_dispatch: 
  schedule:
    # 建议设置在主工作流运行前的一两个小时执行
    # 比如主工作流是每天 0 点，这里就可以设置为每天 22 点 (UTC时间)
    - cron: '0 22 * * *'

jobs:
  web-hunt:
    runs-on: ubuntu-24.04
    permissions:
      contents: write 

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Python Dependencies
        run: pip install requests

      - name: 4. Run Search Scraper (执行全网爬虫)
        run: python search_scraper.py

      - name: 5. Move to Nodes Dir & Push (归档并触发主流程)
        run: |
          # 确保 Nodes 文件夹存在
          mkdir -p Nodes
          
          # 将爬虫生成的带有时间戳的 txt 文件移动到 Nodes 文件夹
          # 如果没抓到文件，2>/dev/null 会吃掉报错，不会让工作流失败
          mv hunted_nodes_*.txt Nodes/ 2>/dev/null || echo "No nodes found today."
          
          # 配置 Git 身份
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          
          # 将 Nodes 文件夹的新变化加入 Git
          git add Nodes/
          
          # 提交更改 (注意：这里我们【不加】 [skip ci]！)
          # 因为我们希望这次提交能够触发主工作流 main.yml 去测速！
          git commit -m "🕷️ Hunted new web nodes: $(date)" || echo "No new files to commit"
          
          # 拉取最新代码防冲突后推送
          git pull origin main --rebase=false -X ours || true
          git push
