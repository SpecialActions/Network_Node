name: 🚀 Internet Auto Node Aggregator

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '30 * * * *' # 每天 UTC 4:00 和 16:00 自动执行
  push:
    paths:
      - 'Config/Internet_Nodes_Aggregation.txt' # 文件更新时自动触发

# ==========================================
# 🌟 全局环境变量配置
# ==========================================
env:
  USE_WARP: 'false'  # 🛡️ WARP 开关：'true' 开启，'false' 关闭

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Download & Install Mihomo Kernel
        run: |
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz
          gunzip mihomo-linux-amd64-v1.18.3.gz
          mv mihomo-linux-amd64-v1.18.3 mihomo
          chmod +x mihomo

      # ==========================================
      # 🛡️ 智能 WARP 环境配置
      # ==========================================
      - name: Setup Cloudflare WARP
        if: env.USE_WARP == 'true'
        run: |
          echo "正在为 GitHub Actions 虚拟服务器安装并连接 Cloudflare WARP..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp
          sudo warp-cli --accept-tos connect
          
          sleep 5
          echo "✅ WARP 连接状态验证："
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep warp=

      - name: Run Aggregation Script & Update Gist
        env:
          GIST_ID_IN: ${{ secrets.GIST_ID_IN }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: python Script/Internet_Nodes_Aggregation.py
